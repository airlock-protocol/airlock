services:
  # ── Shared Infrastructure ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - airlock-net

  # ── Airlock Trust Gateway ────────────────────────────────────────────
  airlock-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AIRLOCK_GATEWAY_SEED_HEX: "cc0d5e3c9a1b4f8e7d2a6b3c8f1e4d7a9b2c5e8f1a4d7b0c3e6f9a2d5b8c1e4f"
      AIRLOCK_REDIS_URL: "redis://redis:6379/0"
      AIRLOCK_LANCEDB_PATH: "/app/data/reputation.lance"
      AIRLOCK_TRUST_TOKEN_SECRET: "demo-trust-secret-change-in-production-minimum-32-chars!"
      AIRLOCK_ADMIN_TOKEN: "demo-admin-token"
      AIRLOCK_SERVICE_TOKEN: "demo-service-token"
      AIRLOCK_CORS_ORIGINS: "*"
      AIRLOCK_LOG_LEVEL: "INFO"
      AIRLOCK_LOG_JSON: "false"
      AIRLOCK_VC_ISSUER_ALLOWLIST: ""
      AIRLOCK_SESSION_VIEW_SECRET: ""
      AIRLOCK_CHALLENGE_FALLBACK_MODE: "rule_based"
    volumes:
      - airlock_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/live', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - airlock-net

  # ── Agent A: Swiggy Order Agent (SDK path) ───────────────────────────
  agent-a:
    build:
      context: ..
      dockerfile: demo/agent_a/Dockerfile
      args: []
    restart: unless-stopped
    environment:
      AIRLOCK_GATEWAY_URL: "http://airlock-gateway:8000"
      AGENT_A_SEED_HEX: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      ISSUER_SEED_HEX: "1111111111111111111111111111111111111111111111111111111111111111"
    ports:
      - "5001:5001"
    depends_on:
      airlock-gateway:
        condition: service_healthy
    networks:
      - airlock-net

  # ── Agent B: Payment Gateway Agent (A2A path, no SDK) ────────────────
  agent-b:
    build:
      context: ..
      dockerfile: demo/agent_b/Dockerfile
      args: []
    restart: unless-stopped
    environment:
      AIRLOCK_GATEWAY_URL: "http://airlock-gateway:8000"
      AGENT_B_SEED_HEX: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
      ISSUER_SEED_HEX: "1111111111111111111111111111111111111111111111111111111111111111"
    ports:
      - "5002:5002"
    depends_on:
      airlock-gateway:
        condition: service_healthy
    networks:
      - airlock-net

networks:
  airlock-net:
    driver: bridge

volumes:
  redis_data:
  airlock_data:
